<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🐹 두더지 잡기 — 몸으로 하는 AR 게임</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="두더지잡기">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0b1020; overflow: hidden; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #wrap { position: relative; width: 100vw; height: 100vh; background: #000; }
  #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #cv  { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #hud { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
         padding: 16px 22px; pointer-events: none; }
  .chip { background: rgba(0,0,0,.45); color: #fff; font-weight: 800; font-size: 30px;
          padding: 6px 18px; border-radius: 999px; }
  #score::before { content: "🐹 "; }
  #time::before  { content: "⏰ "; }
  #dbg { position: absolute; left: 12px; bottom: 12px; color: #fff; font-size: 14px; font-weight: 700;
         background: rgba(0,0,0,.5); padding: 5px 12px; border-radius: 10px; pointer-events: none; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
             background: rgba(8,12,30,.82); backdrop-filter: blur(3px); text-align: center; padding: 24px; }
  #panel { color: #fff; max-width: 440px; }
  #panel h1 { font-size: 44px; margin-bottom: 8px; }
  #panel p  { font-size: 19px; opacity: .9; line-height: 1.5; margin: 8px 0; }
  #bigscore { font-size: 64px; font-weight: 900; color: #ffd24a; margin: 10px 0; }
  button { margin-top: 18px; font-size: 26px; font-weight: 800; color: #0b1020; background: #ffd24a;
           border: none; border-radius: 16px; padding: 16px 44px; cursor: pointer; box-shadow: 0 6px 0 #c79a16; }
  button:active { transform: translateY(3px); box-shadow: 0 3px 0 #c79a16; }
  #status { font-size: 15px; opacity: .75; margin-top: 14px; min-height: 20px; }
  .hide { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="cv"></canvas>
  <div id="hud">
    <div class="chip" id="score">0</div>
    <div class="chip" id="time">60</div>
  </div>
  <div id="dbg">손 인식 대기</div>
  <div id="overlay">
    <div id="panel">
      <h1>🐹 두더지 잡기</h1>
      <div id="bigscore" class="hide"></div>
      <p id="lead">손으로 튀어나오는 두더지를 빵! 때려요.<br>손이 화면에 잘 보이게 한 발 물러서세요.</p>
      <button id="startBtn">시작하기</button>
      <p id="status">시작을 누르면 카메라를 켭니다 (허용 필요)</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.20.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
<script>
const video = document.getElementById('cam');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bigscore = document.getElementById('bigscore');
const lead = document.getElementById('lead');
const dbg = document.getElementById('dbg');

let detector = null, running = false, score = 0, timeLeft = 60;
let moles = [], particles = [], lastSpawn = 0, spawnGap = 1100, timerId = null;
let nHands = 0, fps = 0, lastT = 0;
const EMOJIS = ['🐹', '🐰', '🐱', '🦔'];
const TIP_IDX = [9, 4, 8, 12, 16, 20];   // 손바닥(9) + 엄지·검지·중지·약지·새끼 끝

function setStatus(t){ statusEl.textContent = t; }

async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 720 } }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  cv.width = video.videoWidth; cv.height = video.videoHeight;
}

async function loadModel(){
  await tf.setBackend('webgl'); await tf.ready();
  detector = await handPoseDetection.createDetector(
    handPoseDetection.SupportedModels.MediaPipeHands,
    { runtime: 'tfjs', modelType: 'lite', maxHands: 2 });
}

// 손가락 21개 → 손바닥+손끝 (px, 거울 x 미러링). big=손바닥
function getTouchPoints(hands){
  const pts = [];
  for (const h of (hands||[])){
    const kp = h.keypoints; if (!kp) continue;
    for (const i of TIP_IDX){
      const p = kp[i]; if (!p) continue;
      pts.push({ x: cv.width - p.x, y: p.y, big: (i===9) });
    }
  }
  return pts;
}

function spawnMole(){
  const r = cv.width * 0.085, m = 1.4 * r;
  moles.push({ x: m + Math.random()*(cv.width-2*m), y: m + Math.random()*(cv.height-2*m),
    r, born: performance.now(), life: 1700, hit: false, emoji: EMOJIS[(Math.random()*EMOJIS.length)|0] });
}

function pop(x, y){
  for (let i=0;i<10;i++){ const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1 }); }
  try { const ac = pop.ac || (pop.ac = new (window.AudioContext||window.webkitAudioContext)());
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.value = 700+Math.random()*300; o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.25, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.15);
    o.start(); o.stop(ac.currentTime+0.15);
  } catch(e){}
}

async function loop(){
  if (!running) return;
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(video, -cv.width, 0, cv.width, cv.height); ctx.restore();

  let pts = [];
  try { const hands = await detector.estimateHands(video, { flipHorizontal:false });
        nHands = hands ? hands.length : 0; pts = getTouchPoints(hands); }
  catch(e){ dbg.textContent = '인식 오류: ' + (e.message||e).toString().slice(0,40); }

  const now = performance.now();
  if (lastT){ fps = Math.round(1000/(now-lastT)); } lastT = now;
  dbg.textContent = `🖐 ${nHands}손 인식 · ${fps}fps`;

  if (now - lastSpawn > spawnGap){ spawnMole(); lastSpawn = now; }
  for (const m of moles){
    const age = now - m.born, t = age/m.life;
    m.scale = t<0.2 ? t/0.2 : (t>0.8 ? (1-t)/0.2 : 1);
    if (age > m.life) m.dead = true;
    if (!m.hit){
      for (const p of pts){
        const hr = m.r*Math.max(.5,m.scale) + cv.width*(p.big?0.045:0.022);
        if (Math.hypot(p.x-m.x, p.y-m.y) < hr){ m.hit=true; m.dead=true; score++; scoreEl.textContent=score; pop(m.x,m.y); break; }
      }
    }
  }
  moles = moles.filter(m => !m.dead);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  for (const m of moles){ ctx.font = (m.r*2*Math.max(.15,m.scale))+'px serif'; ctx.fillText(m.emoji, m.x, m.y); }
  for (const p of pts){
    if (p.big){ ctx.beginPath(); ctx.arc(p.x, p.y, cv.width*0.05, 0, 7);
      ctx.fillStyle='rgba(255,210,74,.30)'; ctx.fill(); ctx.lineWidth=4; ctx.strokeStyle='#ffd24a'; ctx.stroke(); }
    else { ctx.beginPath(); ctx.arc(p.x, p.y, cv.width*0.018, 0, 7); ctx.fillStyle='#ffd24a'; ctx.fill(); }
  }
  for (const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life-=0.04; }
  particles = particles.filter(p=>p.life>0);
  for (const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle='#ffd24a';
    ctx.beginPath(); ctx.arc(p.x,p.y,6,0,7); ctx.fill(); ctx.globalAlpha=1; }

  requestAnimationFrame(loop);
}

function endGame(){
  running = false; clearInterval(timerId);
  lead.classList.add('hide'); bigscore.classList.remove('hide');
  bigscore.textContent = '🏆 ' + score + '마리!';
  startBtn.textContent = '다시 하기'; overlay.classList.remove('hide');
}

async function start(){
  startBtn.disabled = true; setStatus('카메라 켜는 중...');
  try { if (!video.srcObject) await setupCamera(); }
  catch(e){ setStatus('카메라를 못 켰어요 — 권한 허용 + https 필요. ('+e.name+')'); startBtn.disabled=false; return; }
  if (!detector){ setStatus('손 인식 AI 로딩 중... (몇 초)'); try { await loadModel(); } catch(e){ setStatus('AI 로딩 실패: '+(e.message||e)); startBtn.disabled=false; return; } }
  score=0; timeLeft=60; moles=[]; particles=[]; lastSpawn=0; spawnGap=1100; lastT=0;
  scoreEl.textContent=0; timeEl.textContent=60;
  overlay.classList.add('hide'); startBtn.disabled=false;
  running = true; requestAnimationFrame(loop);
  timerId = setInterval(()=>{ timeLeft--; timeEl.textContent=timeLeft;
    if (timeLeft%10===0 && spawnGap>500) spawnGap-=80;
    if (timeLeft<=0) endGame(); }, 1000);
}
startBtn.addEventListener('click', start);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
