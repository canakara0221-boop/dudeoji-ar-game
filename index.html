<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🐹 두더지 잡기 — 몸으로 하는 AR 게임</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="두더지잡기">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0b1020; overflow: hidden; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #wrap { position: relative; width: 100vw; height: 100vh; background: #000; }
  #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #cv  { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #hud { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
         padding: 16px 22px; pointer-events: none; }
  .chip { background: rgba(0,0,0,.45); color: #fff; font-weight: 800; font-size: 30px;
          padding: 6px 18px; border-radius: 999px; }
  #score::before { content: "🐹 "; }
  #time::before  { content: "⏰ "; }
  #dbg { position: absolute; left: 12px; bottom: 12px; color: #fff; font-size: 14px; font-weight: 700;
         background: rgba(0,0,0,.5); padding: 5px 12px; border-radius: 10px; pointer-events: none; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
             background: rgba(8,12,30,.82); backdrop-filter: blur(3px); text-align: center; padding: 24px; }
  #panel { color: #fff; max-width: 440px; }
  #panel h1 { font-size: 44px; margin-bottom: 8px; }
  #panel p  { font-size: 19px; opacity: .9; line-height: 1.5; margin: 8px 0; }
  #bigscore { font-size: 64px; font-weight: 900; color: #ffd24a; margin: 10px 0; }
  button { margin-top: 18px; font-size: 26px; font-weight: 800; color: #0b1020; background: #ffd24a;
           border: none; border-radius: 16px; padding: 16px 44px; cursor: pointer; box-shadow: 0 6px 0 #c79a16; }
  button:active { transform: translateY(3px); box-shadow: 0 3px 0 #c79a16; }
  #status { font-size: 15px; opacity: .8; margin-top: 14px; min-height: 20px; }
  .hide { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="cv"></canvas>
  <div id="hud">
    <div class="chip" id="score">0</div>
    <div class="chip" id="time">60</div>
  </div>
  <div id="dbg">대기</div>
  <div id="overlay">
    <div id="panel">
      <h1>🐹 두더지 잡기</h1>
      <div id="bigscore" class="hide"></div>
      <p id="lead">손으로 튀어나오는 두더지를 빵! 때려요.<br>온몸이 화면에 보이게 2m쯤 물러서세요.</p>
      <button id="startBtn">시작하기</button>
      <p id="status">시작을 누르면 카메라를 켭니다 (허용 필요)</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.20.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
const video = document.getElementById('cam');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bigscore = document.getElementById('bigscore');
const lead = document.getElementById('lead');
const dbg = document.getElementById('dbg');
const VERSION = 'v9';
dbg.textContent = '버전 ' + VERSION + ' · 대기';

let detector = null, running = false, score = 0, timeLeft = 60;
let moles = [], particles = [], lastSpawn = 0, spawnGap = 1100, timerId = null;
let nHands = 0, fps = 0, lastT = 0, modelState = '미로딩';
const EMOJIS = ['🐹', '🐰', '🐱', '🦔'];

function setStatus(t){ statusEl.textContent = t; }

async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 720 } }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  cv.width = video.videoWidth || 640; cv.height = video.videoHeight || 480;
}

async function loadModel(){
  await tf.setBackend('webgl'); await tf.ready();
  detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
  modelState = 'OK';
}

// 팔꿈치(7/8)→손목(9/10) 방향으로 손끝까지 연장 → 거울 x 미러링
function getHands(kps){
  const hands = [];
  if (!kps) return hands;
  for (const [ei, wi] of [[7,9],[8,10]]){
    const w = kps[wi], e = kps[ei];
    if (!w || w.score < 0.25) continue;
    let hx = w.x, hy = w.y;
    if (e && e.score > 0.25){ hx = w.x + (w.x-e.x)*0.6; hy = w.y + (w.y-e.y)*0.6; }
    hands.push({ x: cv.width - hx, y: hy });
  }
  return hands;
}

function spawnMole(){
  const r = cv.width * 0.085, m = 1.4 * r;
  moles.push({ x: m + Math.random()*(cv.width-2*m), y: m + Math.random()*(cv.height-2*m),
    r, born: performance.now(), life: 1800, hit: false, emoji: EMOJIS[(Math.random()*EMOJIS.length)|0] });
}

// 오디오 — 모바일은 시작(탭) 시 resume 해야 소리남
let audioCtx = null;
function initAudio(){
  try { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume(); } catch(e){}
}
function noteAt(delay, freq, dur, type, vol){
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime + delay;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.setValueAtTime(freq, t);
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(vol || 0.25, t);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e){}
}
// 연속 명중 시 음이 도→레→미↑ 상승(콤보) = 게임 느낌
const SCALE = [523, 587, 659, 784, 880, 1047, 1175, 1319, 1568, 1760];
let combo = 0, lastHit = 0;
function hitSound(){
  const now = performance.now();
  combo = (now - lastHit < 1400) ? combo + 1 : 1; lastHit = now;
  const f = SCALE[Math.min(combo - 1, SCALE.length - 1)];
  noteAt(0,    f,       0.11, 'square',   0.28);   // 코인풍 본음
  noteAt(0.04, f * 1.5, 0.08, 'square',   0.18);   // 화음
  noteAt(0,    f / 3,   0.05, 'triangle', 0.14);   // 저음 펀치
}
function overSound(){   // 마무리 팡파레(상승 3음)
  noteAt(0,    784,  0.14, 'square', 0.26);
  noteAt(0.14, 988,  0.14, 'square', 0.26);
  noteAt(0.28, 1319, 0.26, 'square', 0.30);
}
function startSound(){ noteAt(0, 659, 0.08, 'square', 0.24); noteAt(0.08, 988, 0.12, 'square', 0.26); }

function pop(x, y){
  for (let i=0;i<12;i++){ const a=Math.random()*Math.PI*2, s=2+Math.random()*6;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1 }); }
  hitSound();
}

async function loop(){
  if (!running) return;
  // 카메라(거울)
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(video, -cv.width, 0, cv.width, cv.height); ctx.restore();

  // 손 인식 (모델 있을 때만 — 없어도 게임은 진행)
  let pts = [];
  if (detector){
    try { const poses = await detector.estimatePoses(video, { flipHorizontal:false });
          const kps = poses[0] && poses[0].keypoints; pts = getHands(kps); nHands = pts.length; }
    catch(e){ modelState = '오류:' + (e.message||e).toString().slice(0,30); }
  }
  const now = performance.now();
  if (lastT) fps = Math.round(1000/(now-lastT)); lastT = now;
  dbg.textContent = `${VERSION} · AI ${modelState} · 🖐 ${nHands}손 · ${fps}fps`;

  // 두더지
  if (now - lastSpawn > spawnGap){ spawnMole(); lastSpawn = now; }
  for (const m of moles){
    const age = now - m.born, t = age/m.life;
    m.scale = t<0.2 ? t/0.2 : (t>0.8 ? (1-t)/0.2 : 1);
    if (age > m.life) m.dead = true;
    if (!m.hit){
      for (const p of pts){
        if (Math.hypot(p.x-m.x, p.y-m.y) < m.r*Math.max(.5,m.scale) + cv.width*0.06){
          m.hit=true; m.dead=true; score++; scoreEl.textContent=score; pop(m.x,m.y); break; }
      }
    }
  }
  moles = moles.filter(m => !m.dead);

  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.globalAlpha = 1;
  for (const m of moles){
    const s = Math.max(.15, m.scale);
    ctx.font = (m.r*1.95*s) + 'px serif';
    // 테두리 없이 — 부드러운 그림자로 배경과 분리(또렷하게)
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = cv.width*0.022; ctx.shadowOffsetY = cv.width*0.006;
    ctx.fillText(m.emoji, m.x, m.y);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.shadowColor = 'transparent';
  }
  for (const p of pts){
    ctx.beginPath(); ctx.arc(p.x, p.y, cv.width*0.055, 0, 7);
    ctx.fillStyle='rgba(255,210,74,.30)'; ctx.fill(); ctx.lineWidth=4; ctx.strokeStyle='#ffd24a'; ctx.stroke();
  }
  for (const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life-=0.04; }
  particles = particles.filter(p=>p.life>0);
  for (const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle='#ffd24a';
    ctx.beginPath(); ctx.arc(p.x,p.y,6,0,7); ctx.fill(); ctx.globalAlpha=1; }

  requestAnimationFrame(loop);
}

function endGame(){
  running = false; clearInterval(timerId); overSound();
  lead.classList.add('hide'); bigscore.classList.remove('hide');
  bigscore.textContent = '🏆 ' + score + '마리!';
  startBtn.textContent = '다시 하기'; overlay.classList.remove('hide');
}

async function start(){
  initAudio();   // 탭(사용자 제스처)에서 오디오 켜기 — 모바일 소리 필수
  startBtn.disabled = true; setStatus('카메라 켜는 중...');
  try { if (!video.srcObject) await setupCamera(); }
  catch(e){ setStatus('카메라 실패 — 권한 허용 + https 필요 ('+e.name+')'); startBtn.disabled=false; return; }
  // 모델 로딩 — 실패해도 게임은 시작(두더지는 무조건 뜸)
  if (!detector){ setStatus('AI 로딩 중...');
    try { await loadModel(); } catch(e){ modelState = '로딩실패'; } }
  score=0; timeLeft=60; moles=[]; particles=[]; lastSpawn=0; spawnGap=1100; lastT=0;
  scoreEl.textContent=0; timeEl.textContent=60; setStatus('');
  overlay.classList.add('hide'); startBtn.disabled=false; startSound();
  running = true; requestAnimationFrame(loop);
  timerId = setInterval(()=>{ timeLeft--; timeEl.textContent=timeLeft;
    if (timeLeft%10===0 && spawnGap>600) spawnGap-=70;
    if (timeLeft<=0) endGame(); }, 1000);
}
startBtn.addEventListener('click', start);

// 디버그 중: 캐시 차단 — 기존 서비스워커 전부 제거(옛 버전 캐시 방지)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then(rs => rs.forEach(r => r.unregister())).catch(()=>{});
}
</script>
</body>
</html>
